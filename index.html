<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIKADO NHL</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c23;
    --border: #252930;
    --accent: #c8a84b;
    --accent2: #4b7fc8;
    --text: #e8eaf0;
    --muted: #6b7280;
    --red: #e05252;
    --green: #4caf7d;
    --blue: #5b9cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .date-badge {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .load-btn {
    background: var(--accent);
    color: #0a0c10;
    border: none;
    padding: 8px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .load-btn:hover { opacity: 0.85; }
  .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN */
  main { padding: 2rem; max-width: 1600px; margin: 0 auto; }

  /* STATUS BAR */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    font-size: 13px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MATCH CARDS */
  .match-section {
    margin-bottom: 3rem;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .match-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--accent);
  }
  .match-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .match-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--accent);
    background: rgba(200,168,75,0.1);
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .match-venue {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* TEAM TABS */
  .team-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .team-tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .team-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,168,75,0.08);
  }
  .team-tab:hover:not(.active) { border-color: var(--border); color: var(--text); }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    min-width: 900px;
  }
  thead {
    background: var(--surface2);
    position: sticky;
    top: 0;
  }
  th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--accent); }
  th:first-child, th:nth-child(2) { text-align: left; }
  th.sorted { color: var(--accent); }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(37,41,48,0.6);
    text-align: center;
    color: var(--text);
    font-weight: 400;
  }
  td:first-child { text-align: left; font-weight: 500; }
  td:nth-child(2) { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* POSITION BADGE */
  .pos-badge {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .pos-C  { background: rgba(91,156,246,0.15); color: #5b9cf6; }
  .pos-LW { background: rgba(76,175,125,0.15); color: #4caf7d; }
  .pos-RW { background: rgba(76,175,125,0.15); color: #4caf7d; }
  .pos-D  { background: rgba(200,168,75,0.15); color: #c8a84b; }
  .pos-G  { background: rgba(224,82,82,0.15); color: #e05252; }

  /* VALUE CELLS */
  .val-high { color: var(--green); font-weight: 500; }
  .val-mid  { color: var(--text); }
  .val-low  { color: var(--muted); }
  .val-zero { color: #3a3f4a; }

  /* RANK */
  .rank { color: var(--muted); font-size: 11px; width: 28px; }

  /* H2H CELL */
  .h2h { font-size: 11px; white-space: nowrap; }

  /* B2B BADGE */
  .b2b-yes { color: var(--accent); font-weight: 600; }

  /* EXPORT */
  .export-row {
    display: flex;
    gap: 8px;
    margin-bottom: 0.75rem;
    justify-content: flex-end;
  }
  .btn-sm {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* EMPTY / ERROR */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    letter-spacing: 0.06em;
  }
  .empty .big { font-size: 48px; font-weight: 900; color: var(--border); display: block; margin-bottom: 0.5rem; }

  /* NOTE */
  .note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    padding-left: 2px;
    font-style: italic;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 1.5rem;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.05em;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* LOADING SKELETON */
  .skeleton-row td { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 400% 100%; animation: shimmer 1.2s infinite; border-radius: 3px; color: transparent; }
  @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
</style>
</head>
<body>

<header>
  <div class="logo">MIKADO <span>NHL</span></div>
  <div class="date-badge" id="header-date"></div>
  <button class="load-btn" id="load-btn" onclick="loadAll()">Charger les matchs</button>
</header>

<main>
  <div id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status-msg">Clique sur "Charger les matchs" pour démarrer.</span>
  </div>
  <div id="legend" style="display:none">
    <div class="legend">
      <span><div class="dot" style="background:#5b9cf6"></div> Centre (C)</span>
      <span><div class="dot" style="background:#4caf7d"></div> Ailier (LW/RW)</span>
      <span><div class="dot" style="background:#c8a84b"></div> Défenseur (D)</span>
      <span><div class="dot" style="background:#e05252"></div> Gardien (G)</span>
      <span style="margin-left:12px"><span style="color:var(--green);font-weight:500">■</span> ≥ 3 pts</span>
      <span><span style="color:var(--text)">■</span> 1-2 pts</span>
      <span><span style="color:var(--muted)">■</span> 0 pts</span>
    </div>
  </div>
  <div id="matches-container">
    <div class="empty">
      <span class="big">NHL</span>
      Clique sur "Charger les matchs" pour voir l'analyse du jour
    </div>
  </div>
</main>

<script>
const NHL_API = 'https://api-web.nhle.com/v1';
const WORKER = 'https://nhl-proxy.973vybration.workers.dev';

async function fetchJSON(url) {
  // Essaie d'abord directement, puis via le Worker Cloudflare
  const urls = [
    url,
    `${WORKER}?url=${encodeURIComponent(url)}`,
  ];
  let lastErr;
  for (const u of urls) {
    try {
      const r = await fetch(u, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch(e) {
      lastErr = e;
      console.warn('Tentative echouee:', u, e.message);
    }
  }
  throw new Error(`Connexion impossible: ${lastErr?.message}`);
}

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmt(date) {
  return new Date(date + 'T12:00:00').toLocaleDateString('fr-CA', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function setStatus(msg, spinning=false) {
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('spinner').style.display = spinning ? 'block' : 'none';
}

// Get game log for a player (last N games)
async function getPlayerGameLog(playerId, season) {
  try {
    const data = await fetchJSON(`${NHL_API}/player/${playerId}/game-log/${season}/2`);
    return data.gameLog || [];
  } catch { return []; }
}

// Sum stats over last N games
function sumStats(log, n) {
  const games = log.slice(0, n);
  let pts=0, g=0, a=0;
  for (const gm of games) {
    pts += (gm.points || 0);
    g   += (gm.goals  || 0);
    a   += (gm.assists|| 0);
  }
  return { pts, g, a, count: games.length };
}

// Check if player is on a back-to-back (played yesterday)
function isB2B(log) {
  if (!log.length) return false;
  const lastGame = new Date(log[0].gameDate);
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  return lastGame.toDateString() === yesterday.toDateString();
}

// Count B2B points this season
function b2bPoints(log) {
  let pts = 0;
  for (let i = 0; i < log.length - 1; i++) {
    const d1 = new Date(log[i].gameDate);
    const d2 = new Date(log[i+1].gameDate);
    const diff = Math.abs(d1 - d2) / 86400000;
    if (diff <= 1) pts += (log[i].points || 0);
  }
  return pts;
}

// H2H stats vs specific opponent
function h2hStats(log, oppAbbrev) {
  const games = log.filter(g => g.opponentAbbrev === oppAbbrev);
  const pts = games.reduce((s,g) => s+(g.points||0), 0);
  return { pts, gp: games.length };
}

// H2H across multiple seasons
async function h2hMultiSeason(playerId, oppAbbrev) {
  const seasons = ['20252026','20242025','20232024','20222023','20222023'];
  let totalPts = 0, totalGP = 0;
  for (const s of seasons) {
    try {
      const data = await fetchJSON(`${NHL_API}/player/${playerId}/game-log/${s}/2`);
      const log = data.gameLog || [];
      const { pts, gp } = h2hStats(log, oppAbbrev);
      totalPts += pts; totalGP += gp;
    } catch {}
  }
  return { pts: totalPts, gp: totalGP };
}

function valClass(v) {
  if (v === 0) return 'val-zero';
  if (v >= 3) return 'val-high';
  if (v >= 1) return 'val-mid';
  return 'val-low';
}

function h2hText(pts, gp) {
  if (gp === 0) return '<span class="val-zero">—</span>';
  return `<span class="h2h">${pts}pt / ${gp}M</span>`;
}

async function fetchPlayerData(player, oppAbbrev, season) {
  const pid = player.id;
  const pos = player.positionCode || '?';

  // Fetch current season log
  let log = [];
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const data = await fetchJSON(`${NHL_API}/player/${pid}/game-log/20252026/2`);
      log = data.gameLog || [];
      break;
    } catch { await new Promise(r => setTimeout(r, 800)); }
  }

  const s10 = sumStats(log, 10);
  const s5  = sumStats(log, 5);
  const s2  = sumStats(log, 2);
  const s1  = sumStats(log, 1);
  const b2b = b2bPoints(log);
  const onB2B = isB2B(log);
  const h2hSzn = h2hStats(log, oppAbbrev);

  // H2H 5 seasons (skaters only)
  let h2h5 = { pts: 0, gp: 0 };
  if (pos !== 'G') {
    try { h2h5 = await h2hMultiSeason(pid, oppAbbrev); } catch {}
  }

  return {
    name: `${player.firstName?.default || ''} ${player.lastName?.default || ''}`.trim(),
    pos,
    pts10: s10.pts, g10: s10.g, a10: s10.a,
    pts5: s5.pts, pts2: s2.pts, pts1: s1.pts,
    b2b, onB2B,
    h2hSznPts: h2hSzn.pts, h2hSznGP: h2hSzn.gp,
    h2h5Pts: h2h5.pts, h2h5GP: h2h5.gp,
    pid
  };
}

async function buildTeamTable(roster, teamAbbrev, oppAbbrev, season, gameId) {
  const rows = [];
  for (const player of roster) {
    const row = await fetchPlayerData(player, oppAbbrev, season);
    rows.push(row);
  }
  rows.sort((a,b) => b.pts10 - a.pts10 || b.pts5 - a.pts5);
  return rows;
}

function renderTable(rows, tableId) {
  return `
  <div class="table-wrap">
  <table id="${tableId}">
    <thead>
      <tr>
        <th>#</th>
        <th onclick="sortTable('${tableId}',1)" title="Nom">Joueur</th>
        <th onclick="sortTable('${tableId}',2)" title="Position">Pos</th>
        <th onclick="sortTable('${tableId}',3)" class="sorted" title="Points 10 derniers matchs">Pts<br>10M</th>
        <th onclick="sortTable('${tableId}',4)" title="Points 5 derniers matchs">Pts<br>5M</th>
        <th onclick="sortTable('${tableId}',5)" title="Points 2 derniers matchs">Pts<br>2M</th>
        <th onclick="sortTable('${tableId}',6)" title="Points au dernier match">Pts<br>Der.</th>
        <th onclick="sortTable('${tableId}',7)" title="Passes 10 derniers matchs">Passe<br>10M</th>
        <th onclick="sortTable('${tableId}',8)" title="Buts 10 derniers matchs">But<br>10M</th>
        <th onclick="sortTable('${tableId}',9)" title="Points en back-to-back">Pts<br>B2B</th>
        <th onclick="sortTable('${tableId}',10)" title="Points face à l'adversaire cette saison">H2H<br>Saison</th>
        <th onclick="sortTable('${tableId}',11)" title="Points face à l'adversaire 5 dernières saisons">H2H<br>5 Saisons</th>
      </tr>
    </thead>
    <tbody>
    ${rows.map((r,i) => `
      <tr>
        <td class="rank">${i+1}</td>
        <td>${r.name}${r.onB2B ? ' <span style="color:var(--accent);font-size:10px" title="Match hier aussi">B2B</span>' : ''}</td>
        <td><span class="pos-badge pos-${r.pos}">${r.pos}</span></td>
        <td class="${valClass(r.pts10)}">${r.pts10}</td>
        <td class="${valClass(r.pts5)}">${r.pts5}</td>
        <td class="${valClass(r.pts2)}">${r.pts2}</td>
        <td class="${valClass(r.pts1)}">${r.pts1}</td>
        <td class="${valClass(r.a10)}">${r.a10}</td>
        <td class="${valClass(r.g10)}">${r.g10}</td>
        <td class="${r.b2b > 0 ? 'b2b-yes' : 'val-zero'}">${r.b2b || '—'}</td>
        <td>${h2hText(r.h2hSznPts, r.h2hSznGP)}</td>
        <td>${h2hText(r.h2h5Pts, r.h2h5GP)}</td>
      </tr>`).join('')}
    </tbody>
  </table>
  </div>`;
}

function sortTable(tableId, colIdx) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const ths = table.querySelectorAll('th');
  ths.forEach(t => t.classList.remove('sorted'));
  ths[colIdx].classList.add('sorted');

  rows.sort((a,b) => {
    const av = parseFloat(a.cells[colIdx]?.textContent) || 0;
    const bv = parseFloat(b.cells[colIdx]?.textContent) || 0;
    return bv - av;
  });
  rows.forEach((r,i) => { r.cells[0].textContent = i+1; tbody.appendChild(r); });
}

function exportCSV(rows, filename) {
  const headers = ['Rang','Joueur','Position','Pts 10M','Pts 5M','Pts 2M','Pts Der.','Passes 10M','Buts 10M','Pts B2B','H2H Saison','H2H 5 Saisons'];
  const csvRows = [headers.join(',')];
  rows.forEach((r,i) => {
    csvRows.push([
      i+1,
      `"${r.name}"`, r.pos, r.pts10, r.pts5, r.pts2, r.pts1,
      r.a10, r.g10, r.b2b,
      `"${r.h2hSznPts}pt/${r.h2hSznGP}M"`,
      `"${r.h2h5Pts}pt/${r.h2h5GP}M"`
    ].join(','));
  });
  const blob = new Blob([csvRows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// Store rows globally for export
const tableData = {};
const CACHE_KEY = `mikado_nhl_cache_${today()}`;

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    // Nettoyer les vieux caches
    for (const key of Object.keys(localStorage)) {
      if (key.startsWith('mikado_nhl_cache_') && key !== CACHE_KEY) {
        localStorage.removeItem(key);
      }
    }
  } catch(e) { console.warn('Cache save failed:', e); }
}

function loadCache() {
  try {
    const data = localStorage.getItem(CACHE_KEY);
    return data ? JSON.parse(data) : null;
  } catch(e) { return null; }
}

async function loadAll(forceReload = false) {
  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  document.getElementById('legend').style.display = 'none';

  const dateStr = today();
  document.getElementById('header-date').textContent = fmt(dateStr);

  // Vérifier le cache d'abord
  if (!forceReload) {
    const cached = loadCache();
    if (cached) {
      setStatus(`✓ Données du cache — ${dateStr} · Clique "Actualiser" pour recharger`, false);
      document.getElementById('matches-container').innerHTML = '';
      document.getElementById('legend').style.display = 'block';
      renderAllMatches(cached);
      btn.disabled = false;
      btn.textContent = '↻ Actualiser';
      btn.onclick = () => loadAll(true);
      return;
    }
  }

  setStatus('Récupération des matchs du jour...', true);

  let schedule;
  try {
    schedule = await fetchJSON(`${NHL_API}/schedule/${dateStr}`);
  } catch(e) {
    setStatus('Tous les proxies ont échoué — voir les instructions ci-dessous.');
    document.getElementById('matches-container').innerHTML = `
      <div class="empty">
        <span class="big" style="font-size:28px;color:var(--red)">Connexion échouée</span>
        <p style="margin-top:1rem;font-size:13px;color:var(--muted);line-height:2;text-align:left;max-width:480px;margin-left:auto;margin-right:auto">
          <strong style="color:var(--text)">Solutions à essayer dans l'ordre :</strong><br>
          1. Désactive ton bloqueur de pub (uBlock, AdBlock) pour ce fichier<br>
          2. Réessaie dans quelques secondes<br>
          3. Ouvre le fichier dans <strong style="color:var(--text)">Chrome ou Edge</strong> (pas Firefox)<br>
          4. Si le problème persiste, essaie d'ouvrir ce lien manuellement :<br>
          <a href="https://api-web.nhle.com/v1/schedule/${dateStr}" target="_blank" style="color:var(--accent);font-size:11px">api-web.nhle.com/v1/schedule/${dateStr}</a><br>
          Si ça affiche du texte → l'API fonctionne, c'est le proxy qui bloque.<br>
          Si erreur → ta connexion internet a un problème.
        </p>
        <button onclick="loadAll()" style="margin-top:1.5rem;background:var(--accent);color:#0a0c10;border:none;padding:10px 24px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:0.08em;cursor:pointer;border-radius:4px;text-transform:uppercase">↻ Réessayer</button>
      </div>`;
    document.getElementById('legend').style.display = 'none';
    btn.disabled = false;
    return;
  }

  const games = schedule?.gameWeek?.[0]?.games || [];
  if (!games.length) {
    document.getElementById('matches-container').innerHTML = `<div class="empty"><span class="big">0</span>Aucun match prévu aujourd'hui</div>`;
    setStatus('Aucun match trouvé pour aujourd\'hui.');
    btn.disabled = false;
    return;
  }

  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('legend').style.display = 'block';

  const season = '20252026';
  const allMatchesData = [];

  for (let gi = 0; gi < games.length; gi++) {
    const game = games[gi];
    const home = game.homeTeam;
    const away = game.awayTeam;
    const gameTime = game.startTimeUTC ? new Date(game.startTimeUTC).toLocaleTimeString('fr-CA', {hour:'2-digit', minute:'2-digit', timeZone:'America/Toronto'}) : '';
    const venue = game.venue?.default || '';
    const matchId = `match_${gi}`;

    setStatus(`Chargement ${away.abbrev} @ ${home.abbrev} (${gi+1}/${games.length})...`, true);

    const section = document.createElement('div');
    section.className = 'match-section';
    section.innerHTML = `
      <div class="match-header">
        <div class="match-title">${away.abbrev} @ ${home.abbrev}</div>
        <div class="match-time">${gameTime} HE</div>
        <div class="match-venue">${venue}</div>
      </div>
      <div id="tabs_${matchId}" class="team-tabs"></div>
      <div id="content_${matchId}"></div>
    `;
    document.getElementById('matches-container').appendChild(section);

    let awayRoster = [], homeRoster = [];
    try {
      const ar = await fetchJSON(`${NHL_API}/roster/${away.abbrev}/${season}`);
      awayRoster = [...(ar.forwards||[]), ...(ar.defensemen||[]), ...(ar.goalies||[])];
    } catch {}
    try {
      const hr = await fetchJSON(`${NHL_API}/roster/${home.abbrev}/${season}`);
      homeRoster = [...(hr.forwards||[]), ...(hr.defensemen||[]), ...(hr.goalies||[])];
    } catch {}

    const teamsData = {};
    for (const [abbrev, roster, opp] of [[away.abbrev, awayRoster, home.abbrev], [home.abbrev, homeRoster, away.abbrev]]) {
      setStatus(`Analyse ${abbrev} vs ${opp} — ${roster.length} joueurs...`, true);
      const rows = await buildTeamTable(roster, abbrev, opp, season, game.id);
      teamsData[abbrev] = rows;
      tableData[`${matchId}_${abbrev}`] = rows;
    }

    allMatchesData.push({ game, away, home, teamsData, matchId, gameTime, venue, dateStr });

    const tabsEl = document.getElementById(`tabs_${matchId}`);
    const contentEl = document.getElementById(`content_${matchId}`);

    (function(away, home, teamsData, matchId, dateStr) {
      function showTeam(abbrev) {
        tabsEl.querySelectorAll('.team-tab').forEach(t => t.classList.toggle('active', t.dataset.abbrev === abbrev));
        const rows = teamsData[abbrev];
        const tid = `tbl_${matchId}_${abbrev}`;
        const oppAbbrev = abbrev === away.abbrev ? home.abbrev : away.abbrev;
        contentEl.innerHTML = `
          <div class="export-row">
            <button class="btn-sm" onclick="exportCSV(tableData['${matchId}_${abbrev}'],'${abbrev}_vs_${oppAbbrev}_${dateStr}.csv')">Exporter CSV</button>
          </div>
          ${renderTable(rows, tid)}
          <p class="note">Trié par Pts 10M · Clique sur un en-tête de colonne pour retrier · H2H = face-à-face · B2B = back-to-back · Données API NHL officielle</p>
        `;
      }

      for (const abbrev of [away.abbrev, home.abbrev]) {
        const tab = document.createElement('button');
        tab.className = 'team-tab';
        tab.dataset.abbrev = abbrev;
        tab.textContent = abbrev === away.abbrev ? `✈ ${abbrev} (Visiteurs)` : `🏠 ${abbrev} (Domicile)`;
        tab.onclick = () => showTeam(abbrev);
        tabsEl.appendChild(tab);
      }
      showTeam(away.abbrev);
    })(away, home, teamsData, matchId, dateStr);
  }

  // Sauvegarder dans le cache
  saveCache(allMatchesData);

  setStatus(`✓ ${games.length} match${games.length>1?'s':''} chargé${games.length>1?'s':''} — ${today()} · Données sauvegardées`, false);
  btn.disabled = false;
  btn.textContent = '↻ Actualiser';
  btn.onclick = () => loadAll(true);
}

function renderAllMatches(allMatchesData) {
  for (const matchData of allMatchesData) {
    const { game, away, home, teamsData, dateStr } = matchData;
    const matchId = matchData.matchId;

    const section = document.createElement('div');
    section.className = 'match-section';
    section.innerHTML = `
      <div class="match-header">
        <div class="match-title">${away.abbrev} @ ${home.abbrev}</div>
        <div class="match-time">${matchData.gameTime} HE</div>
        <div class="match-venue">${matchData.venue}</div>
      </div>
      <div id="tabs_${matchId}" class="team-tabs"></div>
      <div id="content_${matchId}"></div>
    `;
    document.getElementById('matches-container').appendChild(section);

    const tabsEl = document.getElementById(`tabs_${matchId}`);
    const contentEl = document.getElementById(`content_${matchId}`);

    for (const [abbrev, rows] of Object.entries(teamsData)) {
      tableData[`${matchId}_${abbrev}`] = rows;
    }

    function showTeam(abbrev) {
      tabsEl.querySelectorAll('.team-tab').forEach(t => t.classList.toggle('active', t.dataset.abbrev === abbrev));
      const rows = teamsData[abbrev];
      const tid = `tbl_${matchId}_${abbrev}`;
      const oppAbbrev = abbrev === away.abbrev ? home.abbrev : away.abbrev;
      contentEl.innerHTML = `
        <div class="export-row">
          <button class="btn-sm" onclick="exportCSV(tableData['${matchId}_${abbrev}'],'${abbrev}_vs_${oppAbbrev}_${dateStr}.csv')">Exporter CSV</button>
        </div>
        ${renderTable(rows, tid)}
        <p class="note">Trié par Pts 10M · Clique sur un en-tête de colonne pour retrier · H2H = face-à-face · B2B = back-to-back · Données API NHL officielle</p>
      `;
    }

    for (const abbrev of [away.abbrev, home.abbrev]) {
      const tab = document.createElement('button');
      tab.className = 'team-tab';
      tab.dataset.abbrev = abbrev;
      tab.textContent = abbrev === away.abbrev ? `✈ ${abbrev} (Visiteurs)` : `🏠 ${abbrev} (Domicile)`;
      tab.onclick = () => showTeam(abbrev);
      tabsEl.appendChild(tab);
    }

    showTeam(away.abbrev);
  }
}

// Init date display
document.getElementById('header-date').textContent = fmt(today());
</script>
</body>
